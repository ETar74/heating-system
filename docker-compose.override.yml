version: '3.8'

services:
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: heating_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@heating.local
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - heating-network

networks:
  heating-network:
    external: true