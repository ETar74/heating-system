services:
  postgres:
    image: postgres:16-alpine
    container_name: heating_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: heating_system
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - heating-network  # ⬅️ Добавьте эту строку

  backend:
    # ... существующий конфиг ...
    networks:
      - heating-network  # ⬅️ Добавьте эту строку

  frontend:
    # ... существующий конфиг ...
    networks:
      - heating-network  # ⬅️ Добавьте эту строку

  pgadmin:
    # ... конфиг из override ...
    networks:
      - heating-network  # ⬅️ Добавьте эту строку

volumes:
  postgres_data:

networks:  # ⬅️ Добавьте этот блок в КОНЕЦ файла
  heating-network:
    driver: bridge